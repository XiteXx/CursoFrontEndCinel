<footer class="footer">
  <div class="clock">

    <div class="flip-card">
      <div class="number">{{ hours }}</div>
      <div class="label">H</div>
    </div>

    <div class="sep">:</div>

    <div class="flip-card">
      <div class="number">{{ minutes }}</div>
      <div class="label">M</div>
    </div>

    <div class="sep">:</div>

    <div class="flip-card">
      <div class="number">{{ seconds }}</div>
      <div class="label">S</div>
    </div>

  </div>

</footer>
